services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/mock_logs:/app/mock_logs
      - ./mock_aem_key:/app/mock_aem_key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
       - LM_STUDIO_URL=http://host.docker.internal:1234/v1
       - MOCK_MODE=false

  mock_aem_server:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "2222:22"
    volumes:
      - ./backend/mock_logs:/mnt/crx/author/crx-quickstart/logs
